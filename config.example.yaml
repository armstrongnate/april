assignee: "your-github-username"
label: "agent:todo"
llm: "claude"               # "claude" or "codex"
skill: "issue-worker"
claude:
  # model: "opus"           # defaults to opus
  # permissionMode: "auto"  # defaults to auto
codex:
  # model: "gpt-5.1-codex-max" # omit to use codex's configured default
  # askForApproval: "never"    # defaults to never; e.g. "on-request"
port: 7890
repos:
  - owner: "org"
    name: "repo-name"
    path: "~/path/to/repo"
    # defaultBranch: "main"         # optional, defaults to main
    # slackChannel: "team-channel"  # optional, posts PR link to this channel
    # postWorktreeHook: "pnpm i"   # optional, runs in worktree after creation
